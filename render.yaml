# Render Blueprint — FRONTEND ONLY.
# The backend (Laravel API + Reverb + queue + scheduler + Postgres + Redis) runs
# on Laravel Cloud. Render just hosts the Nuxt SPA as a free static site.
#
# Deploy: push to your repo, then Render > New > Blueprint > pick this repo.
# (Or skip the blueprint entirely and create a Static Site by hand — it's one service.)
services:
  - type: web
    name: sidechat-web
    runtime: static
    # ssr:false in nuxt.config.ts makes `generate` emit a pure SPA into .output/public.
    buildCommand: cd frontend && npm ci && npm run generate
    staticPublishPath: frontend/.output/public
    # SPA fallback so client-side routes (/chats/:id) resolve on hard refresh / deep link.
    routes:
      - { type: rewrite, source: /*, destination: /index.html }
    envVars:
      # NUXT_PUBLIC_* are inlined at BUILD time. Fill these from your Laravel Cloud
      # backend once it's deployed (Settings here, or the dashboard):
      - key: NUXT_PUBLIC_API_BASE      # https://<your-app>.laravel.cloud
        sync: false
      - key: NUXT_PUBLIC_REVERB_KEY    # = REVERB_APP_KEY set on Laravel Cloud
        sync: false
      - key: NUXT_PUBLIC_REVERB_HOST   # Reverb host from Laravel Cloud (no scheme)
        sync: false
      - { key: NUXT_PUBLIC_REVERB_PORT, value: "443" }
      - { key: NUXT_PUBLIC_REVERB_SCHEME, value: https }
